<div class="kpi-row">
{% for tier in tiers %}
<div class="kpi clickable" data-tier="{{ tier.key }}" onclick="setView('{{ tier.key }}')" style="border-left:3px solid {{ tier.color }}">
  <span class="kpi-arrow">→</span>
  <div class="kpi-lbl">{{ tier.label }}</div>
  <div class="kpi-val" style="color:{{ tier.color }}"><span class="kpi-n">{{ tier.n }}</span><span class="sub"> / {{ tier.pct }}%</span></div>
  <div class="kpi-hint">vacancies</div>
  <div class="mini-track"><div class="mini-fill" style="width:{{ tier.pct }}%;background:{{ tier.color }}"></div></div>
</div>
{% endfor %}
</div>
